name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "27 3 * * 2"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-python:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.31.6
        with:
          languages: python

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.31.6

  analyze-go:
    name: Analyze (go)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            dev/tools/go.sum
            examples/chrome-sandbox/go.sum
            site/go.sum

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.31.6
        with:
          languages: go
          build-mode: manual

      - name: Build Go modules
        run: |
          mkdir -p /tmp/codeql-build
          make build
          (cd dev/tools && go build -o /tmp/codeql-build/resourcectl ./resourcectl)
          (cd examples/chrome-sandbox && go build -o /tmp/codeql-build/chrome-sandbox-entrypoint ./cmd/chrome-sandbox-entrypoint)

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.31.6
